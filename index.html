<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puncraft.ca</title>
  <meta name="description" content="Currently: building something.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --accent2: #3fb950;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 28px;
    }

    .avatar {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 10px;
      font-size: 1.5rem;
    }

    h1 {
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 0.9rem;
      color: var(--muted);
      font-style: italic;
    }

    .projects {
      width: 100%;
      max-width: 640px;
    }

    .projects h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 12px;
      text-align: center;
    }

    .project-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .project {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s;
    }

    .project:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .project-icon {
      font-size: 1.3rem;
      flex-shrink: 0;
    }

    .project-info { flex: 1; }

    .project-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .project-desc {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .project-arrow {
      color: var(--muted);
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="avatar">👨‍💻</div>
    <h1>Puncraft.ca</h1>
    <p class="tagline">Currently: building something.</p>
  </div>

  <div class="projects">
    <h2>Projects &amp; Links</h2>
    <div class="project-list">

      <a class="project" href="https://qr.puncraft.ca">
        <div class="project-icon">▦</div>
        <div class="project-info">
          <div class="project-name">Quicher</div>
          <div class="project-desc">QR &amp; barcode generator. No ads.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="http://diskstation:5031">
        <div class="project-icon">🍽️</div>
        <div class="project-info">
          <div class="project-name">Feed The Week</div>
          <div class="project-desc">Meal planning. Local LAN only.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://calendar.google.com">
        <div class="project-icon">📅</div>
        <div class="project-info">
          <div class="project-name">Google Calendar</div>
          <div class="project-desc">Schedule and events.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://chatgpt.com">
        <div class="project-icon">🤖</div>
        <div class="project-info">
          <div class="project-name">ChatGPT</div>
          <div class="project-desc">AI assistant.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://www.youtube.com">
        <div class="project-icon">▶️</div>
        <div class="project-info">
          <div class="project-name">YouTube</div>
          <div class="project-desc">Video.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://www.google.ca/maps">
        <div class="project-icon">🗺️</div>
        <div class="project-info">
          <div class="project-name">Google Maps</div>
          <div class="project-desc">Canada.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

    </div>
  </div>

</body>
</html>
