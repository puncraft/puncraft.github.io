<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puncraft.ca</title>
  <meta name="description" content="Currently: building something.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #7d8590;
      --accent: #58a6ff;
      --accent2: #3fb950;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 60px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 2rem;
    }

    h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      color: var(--text);
      margin-bottom: 12px;
    }

    .tagline {
      font-size: clamp(0.95rem, 2.5vw, 1.1rem);
      color: var(--muted);
      font-style: italic;
    }

    .projects {
      width: 100%;
      max-width: 560px;
    }

    .projects h2 {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 16px;
      text-align: center;
    }

    .project-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .project {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 16px 20px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s;
    }

    .project:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .project-icon {
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .project-info { flex: 1; }

    .project-name {
      font-weight: 600;
      font-size: 1rem;
      margin-bottom: 3px;
    }

    .project-desc {
      font-size: 0.85rem;
      color: var(--muted);
    }

    .project-arrow {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .github-link {
      margin-top: 48px;
      text-align: center;
    }

    .github-link a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }

    .github-link a:hover { color: var(--accent); }
  </style>
</head>
<body>

  <div class="hero">
    <div class="avatar">👨‍💻</div>
    <h1>Puncraft.ca</h1>
    <p class="tagline">Currently: building something.</p>
  </div>

  <div class="projects">
    <h2>Projects</h2>
    <div class="project-list">

      <a class="project" href="https://qr.puncraft.ca">
        <div class="project-icon">▦</div>
        <div class="project-info">
          <div class="project-name">Quicher</div>
          <div class="project-desc">QR code &amp; barcode generator and scanner. No ads, no nonsense.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="http://diskstation:5031">
        <div class="project-icon">🍽️</div>
        <div class="project-info">
          <div class="project-name">Feed The Week</div>
          <div class="project-desc">Meal planning. Local LAN only.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://calendar.google.com">
        <div class="project-icon">📅</div>
        <div class="project-info">
          <div class="project-name">Google Calendar</div>
          <div class="project-desc">Schedule and events.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

      <a class="project" href="https://chatgpt.com">
        <div class="project-icon">🤖</div>
        <div class="project-info">
          <div class="project-name">ChatGPT</div>
          <div class="project-desc">AI assistant.</div>
        </div>
        <div class="project-arrow">→</div>
      </a>

    </div>
  </div>

</body>
</html>
